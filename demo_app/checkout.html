<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SwiftShop — Order Confirmed</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0a0a0a; --surface: #111; --border: #222; --accent: #e8ff47; --text: #f0f0f0; --muted: #666; }
    body {
      background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .container {
      max-width: 480px; width: 100%; padding: 24px; text-align: center;
      animation: fadeUp 0.6s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform:translateY(0); } }

    .check { font-size: 4rem; margin-bottom: 20px; }
    h1 { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 32px; }

    .order-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px; margin-bottom: 24px; text-align: left;
    }
    .order-id {
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); margin-bottom: 4px;
    }
    .order-num {
      font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 700;
      color: var(--accent);
    }

    .btn {
      display: inline-block; background: var(--accent); color: #0a0a0a;
      text-decoration: none; border-radius: 10px; padding: 14px 32px;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="check">✅</div>
    <h1>Order Confirmed!</h1>
    <p class="subtitle">Your order has been placed successfully.<br>We'll send you a confirmation shortly.</p>

    <div class="order-card">
      <div class="order-id">Order ID</div>
      <div class="order-num" id="order-num">#SWF-000000</div>
    </div>

    <a href="products.html" class="btn">Continue Shopping</a>
  </div>

  <script>
    if (!localStorage.getItem("auth_user")) window.location.href = "index.html";
    const id = Math.floor(Math.random() * 900000) + 100000;
    document.getElementById("order-num").textContent = `#SWF-${id}`;
  </script>
</body>
</html>
