<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SwiftShop — Products</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222;
      --accent: #e8ff47;
      --text: #f0f0f0;
      --muted: #666;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.9);
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    .brand {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .brand span { color: var(--accent); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .cart-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.2s;
      text-decoration: none;
    }

    .cart-btn:hover { border-color: var(--accent); }

    .cart-count {
      background: var(--accent);
      color: #0a0a0a;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 1px 6px;
    }

    .logout-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.85rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    .logout-btn:hover { color: var(--text); }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 16px;
      color: var(--muted);
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }

    .filter-btn.active, .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .sort-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
      animation: fadeUp 0.4s ease both;
    }

    .product-card:hover {
      border-color: #333;
      transform: translateY(-2px);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .product-img {
      width: 100%;
      aspect-ratio: 4/3;
      background: #161616;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }

    .product-body {
      padding: 16px;
    }

    .product-category {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .product-name {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .product-price {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .add-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .add-btn:hover {
      background: var(--accent);
      color: #0a0a0a;
      border-color: var(--accent);
    }

    .add-btn.added {
      background: var(--accent);
      color: #0a0a0a;
      border-color: var(--accent);
    }

    .empty-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
    }

    .empty-state p { margin-top: 8px; font-size: 0.9rem; }
  </style>
</head>
<body>

  <nav>
    <div class="brand">Swift<span>Shop</span></div>
    <div class="nav-right">
      <a href="cart.html" class="cart-btn" id="cart-link">
        🛒 Cart <span class="cart-count" id="cart-count">0</span>
      </a>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <h1 class="page-title">Products</h1>
      <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
        <div class="filter-bar" id="filter-bar">
          <button class="filter-btn active" onclick="filterCategory('all', this)">All</button>
          <button class="filter-btn" onclick="filterCategory('electronics', this)">Electronics</button>
          <button class="filter-btn" onclick="filterCategory('clothing', this)">Clothing</button>
          <button class="filter-btn" onclick="filterCategory('accessories', this)">Accessories</button>
        </div>
        <select class="sort-select" id="sort-select" onchange="sortProducts()">
          <option value="default">Sort: Default</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="name-asc">Name: A-Z</option>
        </select>
      </div>
    </div>

    <div class="products-grid" id="products-grid"></div>
  </main>

  <script>
    // Auth guard
    if (!localStorage.getItem("auth_user")) {
      window.location.href = "index.html";
    }

    const PRODUCTS = [
      { id: 1, name: "Wireless Headphones", category: "electronics", price: 299000, emoji: "🎧" },
      { id: 2, name: "Mechanical Keyboard", category: "electronics", price: 850000, emoji: "⌨️" },
      { id: 3, name: "USB-C Hub 7-in-1",   category: "electronics", price: 420000, emoji: "🔌" },
      { id: 4, name: "Minimalist Watch",    category: "accessories", price: 1200000, emoji: "⌚" },
      { id: 5, name: "Canvas Tote Bag",     category: "accessories", price: 180000, emoji: "👜" },
      { id: 6, name: "Oversized Hoodie",    category: "clothing",    price: 350000, emoji: "👕" },
      { id: 7, name: "Running Sneakers",    category: "clothing",    price: 650000, emoji: "👟" },
      { id: 8, name: "Wireless Mouse",      category: "electronics", price: 275000, emoji: "🖱️" },
    ];

    let cart = JSON.parse(localStorage.getItem("cart") || "[]");
    let currentCategory = "all";
    let currentSort = "default";

    function updateCartCount() {
      document.getElementById("cart-count").textContent = cart.length;
    }

    function addToCart(id) {
      const product = PRODUCTS.find(p => p.id === id);
      cart.push(product);
      localStorage.setItem("cart", JSON.stringify(cart));
      updateCartCount();

      const btn = document.getElementById(`btn-${id}`);
      btn.textContent = "✓ Added";
      btn.classList.add("added");
    }

    function filterCategory(category, el) {
      currentCategory = category;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      el.classList.add("active");
      renderProducts();
    }

    function sortProducts() {
      currentSort = document.getElementById("sort-select").value;
      renderProducts();
    }

    function renderProducts() {
      let filtered = currentCategory === "all"
        ? [...PRODUCTS]
        : PRODUCTS.filter(p => p.category === currentCategory);

      if (currentSort === "price-asc")  filtered.sort((a,b) => a.price - b.price);
      if (currentSort === "price-desc") filtered.sort((a,b) => b.price - a.price);
      if (currentSort === "name-asc")   filtered.sort((a,b) => a.name.localeCompare(b.name));

      const grid = document.getElementById("products-grid");

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
          <div style="font-size:2rem">📦</div>
          <p>No products found</p>
        </div>`;
        return;
      }

      grid.innerHTML = filtered.map(p => `
        <div class="product-card">
          <div class="product-img">${p.emoji}</div>
          <div class="product-body">
            <div class="product-category">${p.category}</div>
            <div class="product-name">${p.name}</div>
            <div class="product-price">Rp ${p.price.toLocaleString('id-ID')}</div>
            <button class="add-btn ${cart.find(c=>c.id===p.id) ? 'added' : ''}"
              id="btn-${p.id}"
              onclick="addToCart(${p.id})">
              ${cart.find(c=>c.id===p.id) ? '✓ Added' : 'Add to Cart'}
            </button>
          </div>
        </div>
      `).join("");
    }

    function logout() {
      localStorage.removeItem("auth_user");
      localStorage.removeItem("cart");
      window.location.href = "index.html";
    }

    updateCartCount();
    renderProducts();
  </script>
</body>
</html>
